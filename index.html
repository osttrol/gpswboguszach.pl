<script>
  const sections = document.querySelectorAll('.info-section');
  const introOverlay = document.getElementById('introOverlay');
  const backToTop = document.getElementById('backToTop');

  function showIntroLogo() {
    document.body.classList.add('intro-active');
    introOverlay.classList.remove('zoom');
    void introOverlay.offsetWidth;
  }

  function hideIntroWithZoom(delay = 900) {
    setTimeout(() => {
      introOverlay.classList.add('zoom');
    }, delay);

    setTimeout(() => {
      document.body.classList.remove('intro-active');
    }, delay + 700);
  }

  function smoothScrollToTop(duration = 1000) {
    return new Promise((resolve) => {
      const start = window.scrollY;
      const startTime = performance.now();

      function easeInOutCubic(t) {
        return t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function step(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeInOutCubic(progress);

        window.scrollTo(0, start * (1 - eased));

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          resolve();
        }
      }

      requestAnimationFrame(step);
    });
  }

  function playIntroOnLoad() {
    showIntroLogo();
    hideIntroWithZoom(1000);
  }

  async function playIntroBackToTop() {
    showIntroLogo();
    await new Promise(resolve => setTimeout(resolve, 250));
    await smoothScrollToTop(1000);
    hideIntroWithZoom(150);
  }

  window.addEventListener('load', () => {
    playIntroOnLoad();
  });

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;

      const section = entry.target;
      const title = section.querySelector('.section-title');
      const cards = section.querySelectorAll('.card');

      title.classList.add('show-title');

      cards.forEach((card, index) => {
        setTimeout(() => {
          card.classList.add('show-card');
        }, 250 + index * 180);
      });

      obs.unobserve(section);
    });
  }, {
    threshold: 0.55
  });

  sections.forEach(section => observer.observe(section));

  function toggleBackToTop() {
    if (window.scrollY > 500) {
      backToTop.classList.add('show-arrow');
    } else {
      backToTop.classList.remove('show-arrow');
    }
  }

  window.addEventListener('scroll', toggleBackToTop);

  backToTop.addEventListener('click', async () => {
    backToTop.classList.remove('show-arrow');
    await playIntroBackToTop();
  });
</script>
