<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wybór języka</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #FDECEF;
      color: #4A3A3A;
      overflow: hidden;
    }

    body.intro-active {
      overflow: hidden;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    /* INTRO */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 32%, rgba(255,255,255,0) 58%),
        linear-gradient(180deg, #FDECEF 0%, #f9e6eb 45%, #f5dfe6 100%);
      opacity: 1;
      visibility: visible;
      transition:
        opacity 1.2s ease,
        visibility 0s linear 1.2s;
    }

    .intro-overlay::before {
      content: "";
      position: absolute;
      width: 68vmax;
      height: 68vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.10) 35%, rgba(255,255,255,0) 70%);
      filter: blur(14px);
      animation: haloPulse 3.4s ease-in-out infinite;
      pointer-events: none;
    }

    .intro-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(1);
      opacity: 1;
      filter: blur(0);
      transition:
        transform 1.45s cubic-bezier(0.16, 0.8, 0.2, 1),
        opacity 1.15s ease,
        filter 1.15s ease;
      will-change: transform, opacity, filter;
    }

    .intro-stage::before {
      content: "";
      position: absolute;
      inset: -8% -10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0.18) 38%, rgba(255,255,255,0) 72%);
      filter: blur(10px);
      opacity: 0.95;
      animation: softBreath 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    .intro-logo {
      position: relative;
      width: min(62vw, 460px);
      max-width: 84vw;
      display: block;
      filter:
        drop-shadow(0 10px 26px rgba(183, 110, 121, 0.22))
        drop-shadow(0 2px 10px rgba(255,255,255,0.36));
      animation: logoFloat 3s ease-in-out infinite;
      transform-origin: center center;
    }

    .intro-overlay.zoom .intro-stage {
      transform: scale(18);
      opacity: 0;
      filter: blur(12px);
    }

    .intro-overlay.zoom {
      opacity: 0;
      visibility: hidden;
    }

    /* EKRAN WYBORU JĘZYKA */
    .language-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      opacity: 0;
      transform: translateY(20px);
      transition:
        opacity 0.9s ease,
        transform 0.9s ease;
    }

    body.selector-visible .language-screen {
      opacity: 1;
      transform: translateY(0);
    }

    .language-box {
      width: min(720px, 100%);
      text-align: center;
      background: rgba(253, 236, 239, 0.74);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(183, 110, 121, 0.26);
      border-radius: 34px;
      padding: 42px 28px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.10);
    }

    .language-logo {
      width: min(34vw, 180px);
      max-width: 180px;
      display: block;
      margin: 0 auto 22px;
      filter:
        drop-shadow(0 8px 18px rgba(183, 110, 121, 0.16))
        drop-shadow(0 2px 8px rgba(255,255,255,0.28));
    }

    .language-box h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      color: #B76E79;
      margin-bottom: 10px;
    }

    .language-box p {
      font-size: 1rem;
      color: #6A5555;
      margin-bottom: 28px;
    }

    .language-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .language-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 76px;
      padding: 14px 16px;
      text-decoration: none;
      color: #B76E79;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(183, 110, 121, 0.28);
      border-radius: 24px;
      transition:
        transform 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
    }

    .language-link:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.52);
      border-color: rgba(183, 110, 121, 0.42);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.10);
    }

    .language-link span {
      display: block;
      line-height: 1.1;
    }

    .language-link small {
      display: block;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.82rem;
      color: #7A6767;
      margin-top: 4px;
    }

    @keyframes logoFloat {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.015); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes haloPulse {
      0% { transform: scale(0.96); opacity: 0.75; }
      50% { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(0.96); opacity: 0.75; }
    }

    @keyframes softBreath {
      0% { transform: scale(0.98); opacity: 0.72; }
      50% { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(0.98); opacity: 0.72; }
    }

    @media (max-width: 768px) {
      .intro-logo {
        width: min(80vw, 340px);
      }

      .language-box {
        padding: 34px 20px;
        border-radius: 28px;
      }

      .language-logo {
        width: min(42vw, 150px);
        margin-bottom: 18px;
      }

      .language-box h1 {
        font-size: clamp(1.7rem, 7vw, 2.3rem);
      }

      .language-box p {
        font-size: 0.95rem;
        margin-bottom: 22px;
      }

      .language-buttons {
        grid-template-columns: 1fr;
      }

      .language-link {
        min-height: 68px;
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body class="intro-active">

  <div class="intro-overlay" id="introOverlay">
    <div class="intro-stage">
      <img src="/logo-slubne.png" alt="Logo ślubne" class="intro-logo">
    </div>
  </div>

  <main class="language-screen">
    <div class="language-box">
      <img src="/logo-slubne.png" alt="Logo ślubne" class="language-logo">

      <h1>Wybierz język</h1>
      <p>Elige idioma · Valitse kieli</p>

      <div class="language-buttons">
        <a href="/pl/" class="language-link">
          <span>Polski</span>
          <small>PL</small>
        </a>

        <a href="/es/" class="language-link">
          <span>Español</span>
          <small>ES</small>
        </a>

        <a href="/fi/" class="language-link">
          <span>Suomi</span>
          <small>FI</small>
        </a>
      </div>
    </div>
  </main>

  <script>
    const introOverlay = document.getElementById('introOverlay');

    function showIntroLogo() {
      document.body.classList.add('intro-active');
      document.body.classList.remove('selector-visible');
      introOverlay.classList.remove('zoom');
      void introOverlay.offsetWidth;
    }

    function hideIntroWithZoom(delay = 1200) {
      setTimeout(() => {
        introOverlay.classList.add('zoom');
      }, delay);

      setTimeout(() => {
        document.body.classList.remove('intro-active');
        document.body.classList.add('selector-visible');
      }, delay + 850);
    }

    window.addEventListener('load', () => {
      showIntroLogo();
      hideIntroWithZoom(1200);
    });
  </script>

</body>
</html>
